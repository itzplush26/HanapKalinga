name: maestro-e2e

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (staging or local)
        required: true
        type: choice
        options:
          - staging
          - local
        default: staging
  pull_request:
    paths:
      - apps/mobile/src/**
      - apps/mobile/app/**
      - apps/mobile/maestro/**
      - apps/mobile/scripts/*.mjs
      - apps/mobile/package.json
      - .github/workflows/maestro-e2e.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "17"

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prebuild & assemble debug APK
        working-directory: apps/mobile
        run: |
          npx expo prebuild --platform android --clean
          cd android
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ${{ runner.temp }}/app.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ runner.temp }}/app.apk
          retention-days: 1

  seed-e2e:
    name: Seed E2E test data
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ADMIN_EMAIL: ${{ steps.seed.outputs.ADMIN_EMAIL }}
      FAMILY_EMAIL: ${{ steps.seed.outputs.FAMILY_EMAIL }}
      NURSE_EMAIL: ${{ steps.seed.outputs.NURSE_EMAIL }}
      PASSWORD: ${{ steps.seed.outputs.PASSWORD }}
      BOOKING_ID: ${{ steps.seed.outputs.BOOKING_ID }}
      NURSE_ID: ${{ steps.seed.outputs.NURSE_ID }}
      VERIFICATION_ID: ${{ steps.seed.outputs.VERIFICATION_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run seed
        id: seed
        run: |
          cd ${{ github.workspace }}
          node apps/mobile/scripts/seed-e2e.mjs | tee /tmp/seed-output.txt
          grep -oE '^[A-Z_]+=.+' /tmp/seed-output.txt >> $GITHUB_OUTPUT
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  maestro-android:
    name: Maestro (${{ matrix.shard }})
    needs: [build-apk, seed-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        shard:
          - auth
          - nurse
          - family
          - admin
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD snapshot
        id: avd-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/
            ~/.android/adb*
          key: avd-34-google_apis-x86_64-v1

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ runner.temp }}

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Generate AVD snapshot (cache miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          avd-name: Pixel_6
          cores: 2
          ram-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          script: echo "AVD snapshot generated and cached"

      - name: Run Maestro E2E tests (${{ matrix.shard }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          avd-name: Pixel_6
          cores: 2
          ram-size: 2048M
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          emulator-boot-timeout: 120
          script: |
            adb install ${{ runner.temp }}/app.apk
            case ${{ matrix.shard }} in nurse) E="${{ needs.seed-e2e.outputs.NURSE_EMAIL }}" ;; family|auth) E="${{ needs.seed-e2e.outputs.FAMILY_EMAIL }}" ;; admin) E="${{ needs.seed-e2e.outputs.ADMIN_EMAIL }}" ;; esac; maestro test apps/mobile/maestro/${{ matrix.shard }}/ --env APP_ID=com.hanapkalinga.mobile --env ENV=${{ inputs.environment || 'staging' }} --env TEST_EMAIL="$E" --env TEST_PASSWORD="${{ needs.seed-e2e.outputs.PASSWORD }}" --env BOOKING_ID="${{ needs.seed-e2e.outputs.BOOKING_ID }}" --env NURSE_ID="${{ needs.seed-e2e.outputs.NURSE_ID }}" --env VERIFICATION_ID="${{ needs.seed-e2e.outputs.VERIFICATION_ID }}"

      - name: Upload Maestro screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots-${{ matrix.shard }}
          path: ~/.maestro/tests/**/*.png
          retention-days: 7

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-${{ matrix.shard }}
          path: ~/.maestro/reports/
          retention-days: 7

  cleanup-e2e:
    name: Cleanup E2E test data
    needs: [maestro-android]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run cleanup
        run: node apps/mobile/scripts/cleanup-e2e.mjs
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
