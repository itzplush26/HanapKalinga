name: maestro-e2e

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (staging or local)
        required: true
        type: choice
        options:
          - staging
          - local
        default: staging
  pull_request:
    paths:
      - apps/mobile/src/**
      - apps/mobile/app/**
      - apps/mobile/maestro/**
      - apps/mobile/scripts/*.mjs
      - apps/mobile/package.json
      - .github/workflows/maestro-e2e.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "17"

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prebuild & assemble debug APK
        working-directory: apps/mobile
        run: |
          npx expo prebuild --platform android --clean
          cd android
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ${{ runner.temp }}/app.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ runner.temp }}/app.apk
          retention-days: 1

  maestro-android:
    name: Maestro (${{ matrix.shard }})
    needs: build-apk
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        shard:
          - auth
          - nurse
          - family
          - admin
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD snapshot
        id: avd-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/
            ~/.android/adb*
          key: avd-34-google_apis-x86_64-v1

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ runner.temp }}

      - name: Generate AVD snapshot (cache miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          avd-name: Pixel_6
          cores: 2
          ram-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          script: echo "AVD snapshot generated and cached"

      - name: Run Maestro E2E tests (${{ matrix.shard }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          avd-name: Pixel_6
          cores: 2
          ram-size: 2048M
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          emulator-boot-timeout: 120
          script: |
            adb install ${{ runner.temp }}/app.apk

            cd ${{ github.workspace }}
            node apps/mobile/scripts/seed-e2e.mjs

            maestro test apps/mobile/maestro/${{ matrix.shard }}/ \
              --env APP_ID=com.hanapkalinga.mobile \
              --env ENV=${{ inputs.environment || 'staging' }} \
              --retry-on-failure=2

            E2E_EXIT_CODE=$?

            node apps/mobile/scripts/cleanup-e2e.mjs

            exit $E2E_EXIT_CODE
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload Maestro screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots-${{ matrix.shard }}
          path: ~/.maestro/tests/**/*.png
          retention-days: 7

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-${{ matrix.shard }}
          path: ~/.maestro/reports/
          retention-days: 7
