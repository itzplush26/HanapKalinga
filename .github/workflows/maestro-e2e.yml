name: maestro-e2e

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (staging or local)
        required: true
        type: choice
        options:
          - staging
          - local
        default: staging
  pull_request:
    paths:
      - apps/mobile/src/**
      - apps/mobile/app/**
      - apps/mobile/maestro/**
      - apps/mobile/scripts/*.mjs
      - apps/mobile/package.json
      - .github/workflows/maestro-e2e.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "22"

jobs:
  maestro-android:
    name: Maestro E2E (Android ${{ matrix.api-level }})
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      matrix:
        api-level: [34]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --clean
        working-directory: apps/mobile

      - name: Build debug APK with Gradle
        run: |
          cd android
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ${{ runner.temp }}/app.apk
        working-directory: apps/mobile

      - name: Run Maestro E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          avd-name: Pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 2048
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell settings put global window_animation_scale 0.0
            adb shell settings put global transition_animation_scale 0.0
            adb shell settings put global animator_duration_scale 0.0

            adb install ${{ runner.temp }}/app.apk

            cd ${{ github.workspace }}
            node apps/mobile/scripts/seed-e2e.mjs

            maestro test apps/mobile/maestro/ \
              --env APP_ID=com.hanapkalinga.mobile \
              --env ENV=${{ inputs.environment || 'staging' }}

            E2E_EXIT_CODE=$?

            node apps/mobile/scripts/cleanup-e2e.mjs

            exit $E2E_EXIT_CODE
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload Maestro screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots-api-${{ matrix.api-level }}
          path: ~/.maestro/tests/**/*.png
          retention-days: 7

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-api-${{ matrix.api-level }}
          path: ~/.maestro/reports/
          retention-days: 7
