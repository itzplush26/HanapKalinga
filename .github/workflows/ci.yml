name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    paths-ignore:
      - "**.md"
      - ".gitignore"
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "22"

jobs:
  phase1-lint:
    name: phase 1 - lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint all workspaces
        run: npm run lint

  phase2-typecheck:
    name: phase 2 - type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [phase1-lint]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check shared package
        working-directory: packages/shared
        run: npx tsc --noEmit
      - name: Type check web app
        working-directory: apps/web
        run: npx tsc --noEmit

  phase3-build:
    name: phase 3 - build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [phase1-lint, phase2-typecheck]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build all workspaces
        run: npm run build

  phase4-dependency-audit:
    name: phase 4 - dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [phase1-lint]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: npm audit
        run: npm run audit:critical

  phase5-secrets-scan:
    name: phase 5 - secrets scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [phase1-lint]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Secrets scan
        run: |
          ! rg -n "\\bsk_[A-Za-z0-9]{16,}" --glob "*.ts" --glob "*.tsx" --glob "*.js" .
          ! rg -n "SUPABASE_SERVICE_ROLE\\s*=" --glob "*.ts" --glob "*.tsx" --glob "*.js" .
          ! rg -n "https://[A-Za-z0-9.-]+\\.r2\\.cloudflarestorage\\.com" --glob "*.ts" --glob "*.tsx" --glob "*.js" .
          ! rg -n -P "(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)[A-Za-z\\d]{32,}" --glob "*.ts" --glob "*.tsx" --glob "!**/node_modules/**" --glob "!**/.next/**" --glob "!apps/web/types/database.types.ts" .
          ! rg -n "NEXT_PUBLIC_[A-Z0-9_]+" apps/web/lib/supabase/service.ts apps/web/app/api

  phase6-ci-summary:
    name: phase 6 - ci summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - phase1-lint
      - phase2-typecheck
      - phase3-build
      - phase4-dependency-audit
      - phase5-secrets-scan
    steps:
      - name: Write summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 1 (Lint): ${{ needs.phase1-lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 2 (Type Check): ${{ needs.phase2-typecheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 3 (Build): ${{ needs.phase3-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 4 (Dependency Audit): ${{ needs.phase4-dependency-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 5 (Secrets Scan): ${{ needs.phase5-secrets-scan.result }}" >> $GITHUB_STEP_SUMMARY
