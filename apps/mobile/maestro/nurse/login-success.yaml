appId: ${APP_ID}
---
- runFlow:
    file: ../shared/setup.yaml
- tapOn:
    id: "landing_button_login"
- tapOn:
    id: "login_input_email"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "login_input_password"
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn:
    id: "login_button_submit"
- extendedWaitUntil:
    notVisible:
      id: "login_button_submit"
    timeout: 15000
# Verify nurse dashboard loaded
- extendedWaitUntil:
    visible:
      id: "availability_button_save"
    timeout: 10000
