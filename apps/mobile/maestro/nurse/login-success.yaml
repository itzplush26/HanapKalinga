appId: ${APP_ID}
---
- runFlow:
    file: ../shared/setup.yaml
- tapOn:
    id: "landing_button_login"
- tapOn:
    id: "login_input_email"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "login_input_password"
- inputText: ${TEST_PASSWORD}
- hideKeyboard
# Wait for captcha to be ready (if captcha is configured)
- runFlow:
    when:
      visible:
        id: "login_captcha_widget"
    commands:
      - extendedWaitUntil:
          visible:
            id: "login_captcha_ready"
          timeout: 30000
- tapOn:
    id: "login_button_submit"
- extendedWaitUntil:
    notVisible:
      id: "login_button_submit"
    timeout: 15000
# Verify nurse dashboard loaded
- extendedWaitUntil:
    visible:
      id: "nurseDashboard_screen"
    timeout: 10000
