appId: ${APP_ID}
env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}
  BOOKING_ID: ${BOOKING_ID}
---
# Login as nurse user
- runFlow:
    file: ../shared/setup.yaml
- runFlow:
    file: ../shared/helpers.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}

# Navigate to Bookings tab
- tapOn:
    text: "Bookings"

# Wait for bookings list
- assertVisible:
    id: "nurseBookings_list_bookings"
    timeout: 15000

# Tap on a pending booking
- tapOn:
    id: "nurseBookings_card_${BOOKING_ID}"

# Wait for booking detail
- assertVisible:
    id: "nurseBookingDetail_button_accept"
    timeout: 10000

# Tap accept
- tapOn:
    id: "nurseBookingDetail_button_accept"

# Wait for confirmation state
- assertNotVisible:
    id: "nurseBookingDetail_button_accept"
    timeout: 10000
