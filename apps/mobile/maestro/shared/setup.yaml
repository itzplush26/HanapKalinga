appId: ${APP_ID}
env:
  APP_ID: ${APP_ID}
---
- launchApp:
    appId: ${APP_ID}
    stopApp: true
    clearState: true

# If a previous session was restored from SecureStore (clearState doesn't clear it),
# log out first so the landing screen becomes visible.
# If already on the landing screen, this block is skipped.
- runFlow:
    when:
      visible: "tab_profile"
    commands:
      - tapOn:
          id: "tab_profile"
      - tapOn:
          id: "profile_button_logout"
          optional: true
      - tapOn:
          id: "logout_button_confirm"
          optional: true

- extendedWaitUntil:
    visible:
      id: "landing_button_login"
    timeout: 60000
