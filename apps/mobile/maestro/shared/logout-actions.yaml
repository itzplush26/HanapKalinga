appId: ${APP_ID}
---
# Navigate to profile tab (works for family/nurse layouts)
- runFlow:
    when:
      visible: "tab_profile"
    file: "../shared/helpers.yaml"
    env:
      TAB_NAME: "profile"

# Tap logout button
- tapOn:
    id: "profile_button_logout"
    optional: true

# Confirm logout if prompted
- tapOn:
    id: "logout_button_confirm"
    optional: true
