appId: ${APP_ID}
env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}
---
# Login as admin user
- runFlow:
    file: ../shared/setup.yaml
- runFlow:
    file: ../shared/helpers.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}

# Navigate to Verifications tab
- tapOn:
    accessibilityLabel: "Verifications tab"

# Wait for verification queue
- assertVisible:
    id: "verificationQueue_list_requests"
    timeout: 15000

# Verify filter tabs are present
- assertVisible:
    id: "verificationQueue_filter_all"
    timeout: 5000
- assertVisible:
    id: "verificationQueue_filter_pending"
    timeout: 5000
