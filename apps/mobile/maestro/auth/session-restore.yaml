appId: ${APP_ID}
env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}
---
# Launch app with clear state to start fresh
- launchApp:
    appId: ${APP_ID}
    stopApp: true
    clearState: true

# Wait for landing screen
- extendedWaitUntil:
    visible:
      id: "landing_button_login"
    timeout: 15000

# Log in with valid credentials
- tapOn:
    id: "landing_button_login"
- tapOn:
    id: "login_input_email"
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "login_input_password"
- inputText: ${TEST_PASSWORD}
- tapOn:
    id: "login_button_submit"

# Verify login succeeded
- extendedWaitUntil:
    notVisible:
      id: "login_button_submit"
    timeout: 15000

# Stop app (simulate background kill)
- stopApp:
    appId: ${APP_ID}

# Relaunch WITHOUT clearing state to verify session persists
- launchApp:
    appId: ${APP_ID}
    clearState: false

# Wait for app to initialize and redirect to role dashboard
# Login button should NOT be visible — session was restored
- extendedWaitUntil:
    notVisible:
      id: "landing_button_login"
    timeout: 20000

# Verify we landed on a role-specific screen
- extendedWaitUntil:
    visible:
      id: "browse_button_filter"
    timeout: 15000
