appId: ${APP_ID}
---
- runFlow:
    file: ../shared/setup.yaml

# Navigate to login from landing
- tapOn:
    id: "landing_button_login"

# Tap forgot password link
- tapOn:
    id: "login_link_forgotPassword"

# Wait for forgot password screen
- extendedWaitUntil:
    visible:
      id: "forgotPassword_input_email"
    timeout: 10000

# Enter email
- tapOn:
    id: "forgotPassword_input_email"
- inputText: ${TEST_EMAIL}

# Dismiss keyboard before captcha/submit
- hideKeyboard

# Wait for captcha to be ready (if captcha is configured)
- runFlow:
    when:
      visible:
        id: "forgotPassword_captcha_widget"
    commands:
      - extendedWaitUntil:
          visible:
            id: "forgotPassword_captcha_ready"
          timeout: 30000

# Submit
- tapOn:
    id: "forgotPassword_button_submit"

# Accept either outcome within a single polling window:
#   A) Success: screen transitions, button disappears
#   B) Controlled error: API rejects (e.g. email not configured in this env)
# The extendedWaitUntil polls for 15s; if button disappears, success.
# If it stays visible, the runFlow fallback checks for handled error state.
- extendedWaitUntil:
    notVisible:
      id: "forgotPassword_button_submit"
    timeout: 15000
    optional: true
- runFlow:
    when:
      visible:
        id: "forgotPassword_text_error"
    commands:
      # Error text appeared — API rejected, which is valid for this env
      - waitForAnimationToEnd
