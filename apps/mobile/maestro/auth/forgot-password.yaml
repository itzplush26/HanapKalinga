appId: ${APP_ID}
env:
  FORGOT_EMAIL: ${TEST_EMAIL}
---
- runFlow:
    file: ../shared/setup.yaml

# Navigate to login from landing
- tapOn:
    id: "landing_button_login"

# Tap forgot password link
- tapOn:
    id: "login_link_forgotPassword"

# Wait for forgot password screen
- extendedWaitUntil:
    visible:
      id: "forgotPassword_input_email"
    timeout: 10000

# Enter email
- tapOn:
    id: "forgotPassword_input_email"
- inputText: ${FORGOT_EMAIL}

# Submit
- tapOn:
    id: "forgotPassword_button_submit"

# Wait for success state (error text absent, screen transitions)
- extendedWaitUntil:
    notVisible:
      id: "forgotPassword_button_submit"
    timeout: 15000
