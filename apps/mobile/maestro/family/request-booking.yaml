appId: ${APP_ID}
env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}
  NURSE_ID: ${NURSE_ID}
---
# Login as family user
- runFlow:
    file: ../shared/setup.yaml
- runFlow:
    file: ../shared/helpers.yaml
    env:
      TEST_EMAIL: ${TEST_EMAIL}
      TEST_PASSWORD: ${TEST_PASSWORD}

# Navigate to Browse tab
- tapOn:
    text: "Browse"

# Wait for nurse list
- extendedWaitUntil:
    visible:
      id: "browse_list_nurses"
    timeout: 10000

# Tap on nurse card
- tapOn:
    id: "browse_card_nurse_${NURSE_ID}"

# Verify nurse detail screen loaded
- extendedWaitUntil:
    visible:
      id: "nurseDetail_text_name"
    timeout: 10000

# Tap request booking
- tapOn:
    id: "nurseDetail_button_requestBooking"

# Wait for new booking screen
- extendedWaitUntil:
    visible:
      id: "bookingNew_picker_date"
    timeout: 10000

# Select patient condition
- tapOn:
    id: "bookingNew_input_condition_bedridden"

# Select shift
- tapOn:
    id: "bookingNew_picker_shift_morning"

# Select a required skill (tap by text)
- scrollUntilVisible:
    element:
      text: "Wound Care"
    direction: DOWN
    timeout: 5000
- tapOn:
    text: "Wound Care"

# Select budget
- scrollUntilVisible:
    element:
      id: "bookingNew_input_budget_under_1000"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "bookingNew_input_budget_under_1000"

# Submit booking request
- scrollUntilVisible:
    element:
      id: "bookingNew_button_submit"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "bookingNew_button_submit"

# Wait for booking success alert
- extendedWaitUntil:
    visible:
      text: "Booking Requested"
    timeout: 15000
